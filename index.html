<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Autónomo Total — Panel de Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080808; color: #fff; font-family: 'Syne', sans-serif; }
    @keyframes ping { 0%,100%{transform:scale(1);opacity:0.25} 50%{transform:scale(2.2);opacity:0} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    input:focus, select:focus, textarea:focus { border-color: rgba(0,255,157,0.4) !important; box-shadow: 0 0 0 3px rgba(0,255,157,0.08); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
    option { background: #111; }
    .fade-in { animation: fadeIn 0.25s ease; }
    .card-hover { transition: border-color 0.2s; }
    .card-hover:hover { border-color: rgba(255,255,255,0.15) !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── CONFIG ──────────────────────────────────────────────────────────────
    const SUPABASE_URL = "https://dpkolxmbzkeqgluthulr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_hReMFUkzIrfY9AhSnuQYug_UUnRGfuf";
    const N8N_WEBHOOK = "https://nation-moderators-explanation-buy.trycloudflare.com/webhook/nuevo-prospecto";    // ── SUPABASE CLIENT ──────────────────────────────────────────────────────
    const sb = async (path, options = {}) => {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json",
          Prefer: options.prefer || "return=representation",
          ...options.headers,
        },
        ...options,
      });
      if (!res.ok) throw new Error(await res.text());
      const text = await res.text();
      return text ? JSON.parse(text) : [];
    };

    // ── HELPERS ──────────────────────────────────────────────────────────────
    const agentColor = { A: "#ff6b6b", B: "#ffd93d", C: "#00ff9d" };
    const estadoColor = {
      nuevo: "#4fc3f7", contactado: "#ffd93d", demo: "#a78bfa",
      cliente: "#00ff9d", descartado: "#555", pendiente: "#888", interesado: "#fb923c", caliente: "#f43f5e"
    };

    function timeAgo(d) {
      if (!d) return "—";
      const s = (Date.now() - new Date(d)) / 1000;
      if (s < 60) return "ahora";
      if (s < 3600) return `hace ${Math.floor(s/60)}m`;
      if (s < 86400) return `hace ${Math.floor(s/3600)}h`;
      return `hace ${Math.floor(s/86400)}d`;
    }

    // ── COMPONENTS ───────────────────────────────────────────────────────────
    function PulsingDot({ color = "#00ff9d" }) {
      return (
        <span style={{ position:"relative", display:"inline-block", width:10, height:10, flexShrink:0 }}>
          <span style={{ position:"absolute", inset:0, borderRadius:"50%", background:color, opacity:0.25, animation:"ping 1.5s ease-in-out infinite" }}/>
          <span style={{ position:"absolute", inset:1.5, borderRadius:"50%", background:color }}/>
        </span>
      );
    }

    function Badge({ text, color }) {
      return (
        <span style={{ fontSize:10, background:color+"22", color, padding:"2px 8px", borderRadius:6, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", whiteSpace:"nowrap" }}>
          {text}
        </span>
      );
    }

    function StatCard({ icon, label, value, color, loading }) {
      return (
        <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:14, padding:"20px 22px" }}>
          <div style={{ fontSize:22, marginBottom:10 }}>{icon}</div>
          <div style={{ fontSize:30, fontWeight:800, color: loading?"#333":color, lineHeight:1 }}>{loading?"—":value}</div>
          <div style={{ fontSize:11, color:"#555", marginTop:4 }}>{label}</div>
        </div>
      );
    }

    const inputStyle = {
      width:"100%", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)",
      borderRadius:8, padding:"10px 14px", color:"#fff", fontSize:14,
      outline:"none", fontFamily:"'Syne', sans-serif", transition:"border-color 0.2s",
    };
    const labelStyle = { display:"block", fontSize:11, color:"#666", marginBottom:6, fontWeight:600, letterSpacing:0.8, textTransform:"uppercase" };

    function ProspectForm({ onSuccess }) {
      const [form, setForm] = useState({ telefono:"", nombre:"", negocio:"", nicho:"" });
      const [loading, setLoading] = useState(false);
      const [done, setDone] = useState(false);
      const [error, setError] = useState("");
      const nichos = ["Peluquería / Salón de Belleza","Taller de Vehículos","Alquiler de Vehículos","Restaurante / Cafetería","Clínica / Consulta","Gimnasio","Inmobiliaria","Otro"];
      const valid = form.telefono && form.nicho;

      async function handleSubmit() {
        if (!valid || loading || done) return;
        setLoading(true); setError("");
        try {
          const [newLead] = await sb("leads", {
            method:"POST",
            body: JSON.stringify({
              telefono: form.telefono,
              nombre: form.nombre || null,
              negocio: form.negocio || null,
              nicho: form.nicho,
              estado: "nuevo",
              agente_actual: "A",
            }),
          });
          try {
            await fetch(N8N_WEBHOOK, {
              method:"POST",
              headers:{"Content-Type":"application/json"},
              body: JSON.stringify({ id:newLead.id, telefono:newLead.telefono, nombre:newLead.nombre, negocio:newLead.negocio, nicho:newLead.nicho }),
            });
          } catch(e) {
            setError("⚠️ Lead guardado. n8n no alcanzable — ¿está Docker corriendo?");
          }
          setDone(true);
          setForm({ telefono:"", nombre:"", negocio:"", nicho:"" });
          onSuccess && onSuccess();
          setTimeout(() => setDone(false), 3500);
        } catch(e) {
          setError("Error al guardar en Supabase: " + e.message);
        }
        setLoading(false);
      }

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
            <div>
              <label style={labelStyle}>📱 Teléfono *</label>
              <input value={form.telefono} onChange={e=>setForm(f=>({...f,telefono:e.target.value}))} placeholder="+34 600 000 000" style={inputStyle}/>
            </div>
            <div>
              <label style={labelStyle}>👤 Nombre</label>
              <input value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} placeholder="Nombre del contacto" style={inputStyle}/>
            </div>
          </div>
          <div>
            <label style={labelStyle}>🏢 Nombre del Negocio</label>
            <input value={form.negocio} onChange={e=>setForm(f=>({...f,negocio:e.target.value}))} placeholder="Ej: Taller González, Salón María..." style={inputStyle}/>
          </div>
          <div>
            <label style={labelStyle}>🎯 Nicho *</label>
            <select value={form.nicho} onChange={e=>setForm(f=>({...f,nicho:e.target.value}))} style={{...inputStyle, color:form.nicho?"#fff":"#555"}}>
              <option value="">Seleccionar nicho...</option>
              {nichos.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
          {error && <div style={{ fontSize:12, color: error.startsWith("⚠️")?"#ffd93d":"#ff6b6b", lineHeight:1.5 }}>{error}</div>}
          <button
            onClick={handleSubmit}
            disabled={!valid || loading || done}
            style={{
              background: done?"transparent": valid?"linear-gradient(135deg,#00ff9d,#00d4aa)":"rgba(255,255,255,0.05)",
              border: done?"1px solid #00ff9d":"none",
              borderRadius:10, padding:"13px 24px",
              color: done?"#00ff9d": valid?"#000":"#444",
              fontWeight:700, fontSize:14,
              cursor: valid&&!loading&&!done?"pointer":"default",
              transition:"all 0.3s", fontFamily:"inherit",
            }}
          >
            {loading?"⏳ Guardando y enviando..."
             : done?"✅ ¡Prospecto creado! El Agente A contactará pronto"
             :"🚀 Enviar a Agente A"}
          </button>
        </div>
      );
    }

    // ── MAIN ─────────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("dashboard");
      const [leads, setLeads] = useState([]);
      const [conversaciones, setConversaciones] = useState([]);
      const [negocios, setNegocios] = useState([]);
      const [loading, setLoading] = useState(true);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [refreshKey, setRefreshKey] = useState(0);

      const refresh = useCallback(() => setRefreshKey(k=>k+1), []);

      useEffect(() => {
        setLoading(true);
        Promise.all([
          sb("leads?order=created_at.desc&limit=100"),
          sb("conversaciones?order=created_at.desc&limit=100"),
          sb("negocios?order=created_at.desc&limit=50"),
        ]).then(([l,c,n]) => {
          setLeads(l); setConversaciones(c); setNegocios(n);
          setLastUpdate(new Date());
        }).catch(console.error).finally(() => setLoading(false));
      }, [refreshKey]);

      useEffect(() => {
        const t = setInterval(refresh, 30000);
        return () => clearInterval(t);
      }, [refresh]);

      const leadsActivos = leads.filter(l => !["descartado","cliente"].includes(l.estado));

      const tabs = [
        { id:"dashboard", label:"Dashboard", icon:"⚡" },
        { id:"leads", label:"Prospectos", icon:"🎯", count: leadsActivos.length },
        { id:"conversaciones", label:"Conversaciones", icon:"💬", count: conversaciones.length },
        { id:"negocios", label:"Clientes", icon:"🏢" },
        { id:"nuevo", label:"Nuevo Prospecto", icon:"➕" },
      ];

      return (
        <div style={{ minHeight:"100vh", background:"#080808", color:"#fff", fontFamily:"'Syne',sans-serif" }}>

          {/* HEADER */}
          <div style={{ borderBottom:"1px solid rgba(255,255,255,0.06)", padding:"0 24px" }}>
            <div style={{ maxWidth:1280, margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"space-between", height:60 }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:30, height:30, borderRadius:8, background:"linear-gradient(135deg,#00ff9d,#00d4aa)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>⚡</div>
                <div>
                  <div style={{ fontWeight:800, fontSize:14, letterSpacing:-0.5 }}>Autónomo Total</div>
                  <div style={{ fontSize:10, color:"#444", letterSpacing:1 }}>PANEL DE CONTROL</div>
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                {lastUpdate && <span style={{ fontSize:11, color:"#444" }}>Actualizado {timeAgo(lastUpdate)}</span>}
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <PulsingDot color="#00ff9d"/>
                  <span style={{ fontSize:11, color:"#555" }}>Live</span>
                </div>
                <button onClick={refresh} style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:8, padding:"6px 14px", color:"#888", fontSize:12, cursor:"pointer", fontFamily:"inherit", transition:"all 0.2s" }}>
                  ↻ Actualizar
                </button>
              </div>
            </div>
          </div>

          {/* NAV */}
          <div style={{ borderBottom:"1px solid rgba(255,255,255,0.06)", padding:"0 24px" }}>
            <div style={{ maxWidth:1280, margin:"0 auto", display:"flex", overflowX:"auto" }}>
              {tabs.map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{
                  background:"none", border:"none", cursor:"pointer",
                  padding:"13px 16px", fontSize:13, fontWeight: tab===t.id?700:400,
                  color: tab===t.id?"#fff":"#555",
                  borderBottom:`2px solid ${tab===t.id?"#00ff9d":"transparent"}`,
                  transition:"all 0.2s", fontFamily:"inherit", whiteSpace:"nowrap",
                  display:"flex", alignItems:"center", gap:6,
                }}>
                  {t.icon} {t.label}
                  {t.count>0 && <span style={{ background:"#00ff9d22", color:"#00ff9d", fontSize:10, fontWeight:700, padding:"1px 6px", borderRadius:10 }}>{t.count}</span>}
                </button>
              ))}
            </div>
          </div>

          {/* CONTENT */}
          <div className="fade-in" key={tab} style={{ maxWidth:1280, margin:"0 auto", padding:"28px 24px" }}>

            {/* DASHBOARD */}
            {tab==="dashboard" && (
              <div style={{ display:"flex", flexDirection:"column", gap:28 }}>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:16 }}>
                  <StatCard icon="🎯" label="Prospectos totales" value={leads.length} color="#4fc3f7" loading={loading}/>
                  <StatCard icon="🔥" label="En proceso" value={leadsActivos.length} color="#ffd93d" loading={loading}/>
                  <StatCard icon="✅" label="Negocios configurados" value={negocios.filter(n=>n.configurado).length} color="#00ff9d" loading={loading}/>
                  <StatCard icon="💬" label="Mensajes totales" value={conversaciones.length} color="#a78bfa" loading={loading}/>
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24 }}>
                  {/* Últimos leads */}
                  <div>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                      <h3 style={{ fontSize:11, color:"#555", letterSpacing:2, textTransform:"uppercase", fontWeight:600 }}>Últimos Prospectos</h3>
                      <button onClick={()=>setTab("leads")} style={{ fontSize:11, color:"#00ff9d", background:"none", border:"none", cursor:"pointer", fontFamily:"inherit" }}>Ver todos →</button>
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                      {loading ? [1,2,3].map(i=><div key={i} style={{ height:58, background:"rgba(255,255,255,0.03)", borderRadius:10, border:"1px solid rgba(255,255,255,0.06)" }}/>) :
                        leads.slice(0,5).map(l=>(
                          <div key={l.id} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, padding:"12px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                            <div>
                              <div style={{ fontSize:13, fontWeight:600, marginBottom:2 }}>{l.nombre||l.telefono}</div>
                              <div style={{ fontSize:11, color:"#555" }}>{l.nicho}</div>
                            </div>
                            <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
                              <Badge text={l.estado||"nuevo"} color={estadoColor[l.estado]||"#888"}/>
                              <span style={{ fontSize:10, color:"#444" }}>{timeAgo(l.created_at)}</span>
                            </div>
                          </div>
                        ))
                      }
                      {!loading && leads.length===0 && <div style={{ textAlign:"center", padding:32, color:"#444", fontSize:13 }}>Sin prospectos aún</div>}
                    </div>
                  </div>

                  {/* Últimas conversaciones */}
                  <div>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                      <h3 style={{ fontSize:11, color:"#555", letterSpacing:2, textTransform:"uppercase", fontWeight:600 }}>Últimas Conversaciones</h3>
                      <button onClick={()=>setTab("conversaciones")} style={{ fontSize:11, color:"#00ff9d", background:"none", border:"none", cursor:"pointer", fontFamily:"inherit" }}>Ver todas →</button>
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                      {loading ? [1,2,3].map(i=><div key={i} style={{ height:58, background:"rgba(255,255,255,0.03)", borderRadius:10, border:"1px solid rgba(255,255,255,0.06)" }}/>) :
                        conversaciones.slice(0,5).map(c=>(
                          <div key={c.id} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, padding:"12px 16px", display:"flex", gap:12, alignItems:"center" }}>
                            <div style={{ width:30, height:30, borderRadius:8, background:(agentColor[c.agente]||"#888")+"22", border:`1px solid ${agentColor[c.agente]||"#888"}44`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, color:agentColor[c.agente]||"#888", fontFamily:"Space Mono", flexShrink:0 }}>
                              {c.agente||"?"}
                            </div>
                            <div style={{ flex:1, minWidth:0 }}>
                              <div style={{ fontSize:11, color:"#666", marginBottom:2 }}>{c.telefono}</div>
                              <div style={{ fontSize:12, color:"#bbb", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.mensaje}</div>
                            </div>
                            <span style={{ fontSize:10, color:"#444", flexShrink:0 }}>{timeAgo(c.created_at)}</span>
                          </div>
                        ))
                      }
                      {!loading && conversaciones.length===0 && <div style={{ textAlign:"center", padding:32, color:"#444", fontSize:13 }}>Sin conversaciones aún</div>}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* LEADS */}
            {tab==="leads" && (
              <div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22 }}>
                  <h2 style={{ fontSize:20, fontWeight:800 }}>Prospectos <span style={{ color:"#444", fontWeight:400 }}>({leads.length})</span></h2>
                  <button onClick={()=>setTab("nuevo")} style={{ background:"linear-gradient(135deg,#00ff9d,#00d4aa)", border:"none", borderRadius:8, padding:"9px 18px", color:"#000", fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>
                    + Nuevo Prospecto
                  </button>
                </div>
                {loading ? <div style={{ color:"#444", textAlign:"center", padding:48 }}>Cargando...</div> : (
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {leads.map(l=>(
                      <div key={l.id} className="card-hover" style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:12, padding:"14px 20px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <div style={{ display:"flex", gap:20, alignItems:"center", flex:1, minWidth:0 }}>
                          <div style={{ minWidth:130 }}>
                            <div style={{ fontSize:14, fontWeight:600, marginBottom:2 }}>{l.nombre||"Sin nombre"}</div>
                            <div style={{ fontSize:11, color:"#555", fontFamily:"Space Mono" }}>{l.telefono}</div>
                          </div>
                          <div style={{ minWidth:140 }}>
                            <div style={{ fontSize:12, color:"#888" }}>{l.negocio||"—"}</div>
                            <div style={{ fontSize:11, color:"#555" }}>{l.nicho}</div>
                          </div>
                          {l.ultimo_mensaje && (
                            <div style={{ flex:1, fontSize:12, color:"#555", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:280 }}>
                              💬 {l.ultimo_mensaje}
                            </div>
                          )}
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
                          {l.agente_actual && <span style={{ fontFamily:"Space Mono", fontSize:10, color:agentColor[l.agente_actual]||"#888", fontWeight:700 }}>AGT-{l.agente_actual}</span>}
                          <Badge text={l.estado||"nuevo"} color={estadoColor[l.estado]||"#888"}/>
                          <span style={{ fontSize:11, color:"#444", minWidth:55, textAlign:"right" }}>{timeAgo(l.ultimo_contacto||l.created_at)}</span>
                        </div>
                      </div>
                    ))}
                    {leads.length===0 && <div style={{ textAlign:"center", padding:48, color:"#444" }}>No hay prospectos. ¡Crea el primero!</div>}
                  </div>
                )}
              </div>
            )}

            {/* CONVERSACIONES */}
            {tab==="conversaciones" && (
              <div>
                <h2 style={{ fontSize:20, fontWeight:800, marginBottom:22 }}>Conversaciones <span style={{ color:"#444", fontWeight:400 }}>({conversaciones.length})</span></h2>
                {loading ? <div style={{ color:"#444", textAlign:"center", padding:48 }}>Cargando...</div> : (
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {conversaciones.map(c=>(
                      <div key={c.id} className="card-hover" style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:12, padding:"14px 20px", display:"flex", gap:14, alignItems:"center" }}>
                        <div style={{ width:36, height:36, borderRadius:10, background:(agentColor[c.agente]||"#888")+"22", border:`1px solid ${agentColor[c.agente]||"#888"}33`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:agentColor[c.agente]||"#888", fontFamily:"Space Mono", flexShrink:0 }}>
                          {c.agente||"?"}
                        </div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ display:"flex", gap:8, marginBottom:4, alignItems:"center" }}>
                            <span style={{ fontSize:13, fontWeight:600 }}>{c.telefono}</span>
                            {c.rol && <Badge text={c.rol} color={c.rol==="user"?"#4fc3f7":"#a78bfa"}/>}
                          </div>
                          <div style={{ fontSize:13, color:"#aaa", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.mensaje}</div>
                        </div>
                        <span style={{ fontSize:11, color:"#444", flexShrink:0 }}>{timeAgo(c.created_at)}</span>
                      </div>
                    ))}
                    {conversaciones.length===0 && <div style={{ textAlign:"center", padding:48, color:"#444" }}>Sin conversaciones registradas aún.</div>}
                  </div>
                )}
              </div>
            )}

            {/* NEGOCIOS */}
            {tab==="negocios" && (
              <div>
                <h2 style={{ fontSize:20, fontWeight:800, marginBottom:22 }}>Clientes <span style={{ color:"#444", fontWeight:400 }}>({negocios.length})</span></h2>
                {loading ? <div style={{ color:"#444", textAlign:"center", padding:48 }}>Cargando...</div> : (
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:16 }}>
                    {negocios.map(n=>(
                      <div key={n.id} style={{ background:"rgba(255,255,255,0.03)", border:`1px solid ${n.configurado?"rgba(0,255,157,0.15)":"rgba(255,255,255,0.07)"}`, borderRadius:14, padding:"20px 22px" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                          <div>
                            <div style={{ fontSize:15, fontWeight:700, marginBottom:2 }}>{n.nombre||"Sin nombre"}</div>
                            <div style={{ fontSize:12, color:"#666" }}>{n.nicho}</div>
                          </div>
                          <Badge text={n.configurado?"activo":"pendiente"} color={n.configurado?"#00ff9d":"#ffd93d"}/>
                        </div>
                        <div style={{ fontSize:11, color:"#555", fontFamily:"Space Mono", marginBottom:8 }}>{n.telefono}</div>
                        {n.servicios && <div style={{ fontSize:11, color:"#555" }}>{Array.isArray(n.servicios)?`${n.servicios.length} servicios`:"Servicios configurados"}</div>}
                        <div style={{ fontSize:10, color:"#444", marginTop:8 }}>{timeAgo(n.created_at)}</div>
                      </div>
                    ))}
                    {negocios.length===0 && <div style={{ gridColumn:"1/-1", textAlign:"center", padding:48, color:"#444" }}>No hay clientes configurados aún.</div>}
                  </div>
                )}
              </div>
            )}

            {/* NUEVO PROSPECTO */}
            {tab==="nuevo" && (
              <div style={{ maxWidth:540, margin:"0 auto" }}>
                <h2 style={{ fontSize:20, fontWeight:800, marginBottom:8 }}>Nuevo Prospecto Manual</h2>
                <p style={{ fontSize:13, color:"#555", marginBottom:28, lineHeight:1.7 }}>
                  Introduce los datos del negocio. El Agente A contactará por WhatsApp automáticamente.
                </p>
                <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:16, padding:28 }}>
                  <ProspectForm onSuccess={()=>{ refresh(); setTimeout(()=>setTab("leads"),1500); }}/>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
